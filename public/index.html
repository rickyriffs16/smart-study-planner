<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Study Planner</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-main);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem 2rem;
            text-align: center;
        }
        .login-icon {
            font-size: 3rem;
            color: var(--brand-primary);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="clean-card login-card">
        <i class="bi bi-journal-bookmark-fill login-icon"></i>
        <h3 class="fw-bold mb-1 title-text">Welcome Back</h3>
        <p class="text-muted mb-4">Sign in to your Study Planner</p>

        <form id="loginForm" class="text-start">
            <div class="alert alert-danger" id="loginError" style="display:none;"></div>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Email Address</label>
                <input type="email" id="usernameInput" class="form-control custom-input" placeholder="you@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Password</label>
                <input type="password" id="passwordInput" class="form-control custom-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2 mb-3">Sign In</button>
            <p class="text-center text-muted small">Don't have an account? <a href="/signup.html" class="text-primary fw-bold text-decoration-none">Sign Up</a></p>
        </form>
    </div>

    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }

        const loginError = document.getElementById('loginError');

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            loginError.style.display = 'none';

            const email = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            // Check against registered users
            const users = JSON.parse(localStorage.getItem('study_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem('study_username', user.name);
                window.location.href = '/dashboard.html';
            } else {
                loginError.textContent = 'Invalid email or password. Please try again.';
                loginError.style.display = 'block';
            }
        });
    </script>
</body>
</html>
