<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Smart Study Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-main);
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 3rem 2rem;
            text-align: center;
        }
        .auth-icon { font-size: 3rem; color: var(--brand-primary); margin-bottom: 1rem; }
        .error-msg { display: none; }
    </style>
</head>
<body>
    <div class="clean-card auth-card">
        <i class="bi bi-journal-bookmark-fill auth-icon"></i>
        <h3 class="fw-bold mb-1 title-text">Create Account</h3>
        <p class="text-muted mb-4">Start organizing your studies today</p>

        <div class="alert alert-danger error-msg" id="errorMsg"></div>
        <div class="alert alert-success" id="successMsg" style="display:none;"></div>

        <form id="signupForm" class="text-start">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Full Name</label>
                <input type="text" id="signupName" class="form-control custom-input" placeholder="e.g. Mani Rithik" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Email Address</label>
                <input type="email" id="signupEmail" class="form-control custom-input" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Password</label>
                <input type="password" id="signupPassword" class="form-control custom-input" placeholder="Minimum 6 characters" required minlength="6">
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control custom-input" placeholder="Re-enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2 mb-3">Create Account</button>
            <p class="text-center text-muted small">Already have an account? <a href="/" class="text-primary fw-bold text-decoration-none">Sign In</a></p>
        </form>
    </div>

    <script>
        // Check theme
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }

        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            // Validation
            if (password !== confirm) {
                errorMsg.textContent = 'Passwords do not match. Please try again.';
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters.';
                errorMsg.style.display = 'block';
                return;
            }

            // Check if email already registered
            const existingUsers = JSON.parse(localStorage.getItem('study_users') || '[]');
            if (existingUsers.find(u => u.email === email)) {
                errorMsg.textContent = 'An account with this email already exists.';
                errorMsg.style.display = 'block';
                return;
            }

            // Save user to localStorage
            existingUsers.push({ name, email, password });
            localStorage.setItem('study_users', JSON.stringify(existingUsers));

            // Show success and redirect
            successMsg.textContent = `Account created successfully! Welcome, ${name}. Redirecting to login...`;
            successMsg.style.display = 'block';

            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        });
    </script>
</body>
</html>
